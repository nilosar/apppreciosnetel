<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entel - Consultor de Ofertas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0a192f; color: #fff; }
        .entel-blue { background: linear-gradient(135deg, #0033a0 0%, #0645ad 100%); }
        .entel-orange-text { color: #ff8200; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .entel-orange-bg { background: linear-gradient(90deg, #ff8200 0%, #ffaa00 100%); }
        .card-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
    </style>
</head>
<body class="pb-10">

    <div class="entel-blue pt-10 pb-12 px-6 shadow-2xl rounded-b-[3rem] mb-8 sticky top-0 z-50">
        <div class="max-w-md mx-auto text-center">
            <h1 class="text-5xl font-black entel-orange-text mb-6 tracking-tighter">Entel</h1>
            
            <input type="text" id="buscador" 
                   placeholder="Buscar modelo o SKU..." 
                   class="w-full p-4 rounded-2xl shadow-xl text-lg outline-none focus:ring-4 focus:ring-orange-400 border-none text-gray-900">
            <div id="contador" class="mt-4 text-blue-200 text-[10px] font-bold uppercase tracking-widest">Sincronizando...</div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4">
        <div id="lista-equipos" class="grid gap-6"></div>
    </div>

    <script>
        let baseDatos = [];

        async function cargarExcel() {
            try {
                const res = await fetch('precios.xlsx');
                const buf = await res.arrayBuffer();
                const wb = XLSX.read(buf, { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]]; 
                baseDatos = XLSX.utils.sheet_to_json(ws);
                
                document.getElementById('contador').innerText = `${baseDatos.length} OFERTAS CARGADAS`;
                render(baseDatos);
            } catch (e) {
                document.getElementById('contador').innerText = "⚠️ ERROR: Verifica el archivo precios.xlsx";
            }
        }

        function render(items) {
            const grid = document.getElementById('lista-equipos');
            grid.innerHTML = "";

            items.forEach(item => {
                const desc = item['Descripción'];
                const cod = item['COD_BARRA'];
                const dcto = item['DCTO'];
                const precio = item['QUEDA CON MANDATO LIGTH'];

                if (desc && precio !== undefined) {
                    grid.innerHTML += `
                        <div class="card-glass overflow-hidden shadow-2xl transition-transform active:scale-95">
                            <div class="px-6 py-2 bg-white/5 flex justify-between items-center border-b border-white/10">
                                <span class="text-[9px] font-bold text-blue-300 tracking-tighter uppercase">SKU: ${cod || '---'}</span>
                                <button onclick="copy('${cod}')" class="text-[9px] font-black text-orange-400">COPIAR</button>
                            </div>

                            <div class="p-6">
                                <h2 class="text-white font-bold text-lg mb-6 leading-tight uppercase tracking-tight">
                                    ${desc}
                                </h2>
                                
                                <div class="flex items-center gap-4">
                                    <div class="flex-1 bg-white/5 p-3 rounded-2xl border border-white/10 text-center">
                                        <span class="block text-[8px] text-gray-400 font-bold uppercase">Descuento</span>
                                        <span class="text-xl font-black text-green-400">-$${Number(dcto || 0).toLocaleString('es-CL')}</span>
                                    </div>

                                    <div class="flex-1 entel-orange-bg p-3 rounded-2xl shadow-lg transform scale-110 text-center">
                                        <span class="block text-[8px] text-white font-black uppercase opacity-80">Valor con Plan</span>
                                        <span class="text-2xl font-black text-white">$${Number(precio).toLocaleString('es-CL')}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            alert("SKU Copiado");
        }

        document.getElementById('buscador').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filt = baseDatos.filter(eq => 
                String(eq['Descripción']).toLowerCase().includes(val) || 
                String(eq['COD_BARRA']).toLowerCase().includes(val)
            );
            render(filt);
        });

        window.onload = cargarExcel;
    </script>
</body>
</html>
